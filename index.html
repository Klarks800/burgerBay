<!DOCTYPE html>
<html lang="en-us">
<head>
    <!-- Content encoding -->
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=yes" />

    <!-- Page info and stylesheets -->
    <title>Galaxy Burger</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">

</head>
<body>
    <!-- Unity canvas -->
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>


    <!-- Unity loader script -->
    <script>
        window.mirraSDK_library_shouldForceOKPlatform = window.mirraSDK_library_shouldForceOKPlatform || function () {
            try {
                var href = window.location && window.location.href ? window.location.href : "";
                var referrer = document.referrer || "";
                var text = (href + " " + referrer).toLowerCase();
                if (text.indexOf("ok.ru") >= 0 || text.indexOf("odnoklassniki") >= 0) {
                    return true;
                }

                var params = new URLSearchParams(window.location.search || "");
                var hash = window.location.hash ? window.location.hash.replace(/^#\/?/, "") : "";
                if (hash.indexOf("=") >= 0) {
                    var hashParams = new URLSearchParams(hash);
                    hashParams.forEach(function (value, key) {
                        params.set(key, value);
                    });
                }

                var okParamNames = ["application_key", "apiconnection", "logged_user_id", "api_server"];
                var okParamCount = 0;
                for (var i = 0; i < okParamNames.length; i++) {
                    if (params.has(okParamNames[i])) {
                        okParamCount++;
                    }
                }

                return okParamCount >= 2;
            }
            catch (exception) {
                console.warn("[MirraSDK] Failed to detect OK platform override.", exception);
                return false;
            }
        };
    </script>
    <script src="unityApp.js"></script>
</body>
</html>
