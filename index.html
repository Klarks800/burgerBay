<!DOCTYPE html>
<html lang="en-us">
<head>
    <!-- Content encoding -->
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=yes" />

    <!-- Page info and stylesheets -->
    <title>Galaxy Burger</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">

</head>
<body>
    <!-- Unity canvas -->
    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>


    <!-- Unity loader script -->
    <script>
        (function () {
            function suppressMediaSession() {
                if (!navigator.mediaSession) {
                    return;
                }

                try {
                    navigator.mediaSession.metadata = null;
                } catch (exception) {
                }

                try {
                    navigator.mediaSession.playbackState = "none";
                } catch (exception) {
                }

                var actions = [
                    "play",
                    "pause",
                    "seekbackward",
                    "seekforward",
                    "previoustrack",
                    "nexttrack",
                    "stop",
                    "seekto"
                ];

                for (var i = 0; i < actions.length; i++) {
                    try {
                        navigator.mediaSession.setActionHandler(actions[i], null);
                    } catch (exception) {
                    }
                }
            }

            function suppressMediaSessionDeferred() {
                suppressMediaSession();
                setTimeout(suppressMediaSession, 0);
                setTimeout(suppressMediaSession, 250);
                setTimeout(suppressMediaSession, 1000);
            }

            var audioContexts = [];

            function registerAudioContext(context) {
                if (context && audioContexts.indexOf(context) < 0) {
                    audioContexts.push(context);
                }

                return context;
            }

            function patchAudioContextConstructor() {
                var NativeAudioContext = window.AudioContext || window.webkitAudioContext;
                if (!NativeAudioContext || NativeAudioContext.__burgerBayPatched) {
                    return;
                }

                function BurgerBayAudioContext(options) {
                    return registerAudioContext(new NativeAudioContext(options));
                }

                BurgerBayAudioContext.prototype = NativeAudioContext.prototype;
                if (Object.setPrototypeOf) {
                    Object.setPrototypeOf(BurgerBayAudioContext, NativeAudioContext);
                }
                BurgerBayAudioContext.__burgerBayPatched = true;

                window.AudioContext = BurgerBayAudioContext;
                if (window.webkitAudioContext === NativeAudioContext) {
                    window.webkitAudioContext = BurgerBayAudioContext;
                }
            }

            function setAudioContextsPaused(paused) {
                for (var i = 0; i < audioContexts.length; i++) {
                    var context = audioContexts[i];
                    if (!context || context.state === "closed") {
                        continue;
                    }

                    try {
                        if (paused && context.state === "running") {
                            context.suspend().catch(function () {});
                        } else if (!paused && context.state === "suspended") {
                            context.resume().catch(function () {});
                        }
                    } catch (exception) {
                    }
                }

                suppressMediaSessionDeferred();
            }

            function collectLaunchParams() {
                var params = new URLSearchParams(window.location.search || "");
                var hash = window.location.hash ? window.location.hash.replace(/^#\/?/, "") : "";
                if (hash.indexOf("=") >= 0) {
                    var hashParams = new URLSearchParams(hash);
                    hashParams.forEach(function (value, key) {
                        params.set(key, value);
                    });
                }

                try {
                    var referrer = document.referrer || "";
                    var queryStart = referrer.indexOf("?");
                    if (queryStart >= 0) {
                        var referrerParams = new URLSearchParams(referrer.substring(queryStart));
                        referrerParams.forEach(function (value, key) {
                            params.set(key, value);
                        });
                    }
                } catch (exception) {
                }

                return params;
            }

            function detectOKPlatform() {
                try {
                    if (window.FAPI && window.FAPI.Util) {
                        return true;
                    }

                    var href = window.location && window.location.href ? window.location.href : "";
                    var referrer = document.referrer || "";
                    var ancestors = "";
                    if (window.location && window.location.ancestorOrigins) {
                        for (var i = 0; i < window.location.ancestorOrigins.length; i++) {
                            ancestors += " " + window.location.ancestorOrigins[i];
                        }
                    }

                    var text = (href + " " + referrer + " " + ancestors).toLowerCase();
                    if (text.indexOf("ok.ru") >= 0 || text.indexOf("odnoklassniki") >= 0 || text.indexOf("okcdn.ru") >= 0 || text.indexOf("api.ok.ru") >= 0) {
                        return true;
                    }

                    var params = collectLaunchParams();
                    var okParamNames = ["application_key", "apiconnection", "logged_user_id", "api_server", "session_key", "auth_sig"];
                    var okParamCount = 0;
                    for (var j = 0; j < okParamNames.length; j++) {
                        if (params.has(okParamNames[j])) {
                            okParamCount++;
                        }
                    }

                    if (okParamCount >= 2) {
                        return true;
                    }

                    var stPlatform = (params.get("st.platform") || params.get("st_platform") || "").toLowerCase();
                    if (stPlatform.indexOf("ok") >= 0 || stPlatform.indexOf("odnoklassniki") >= 0) {
                        return true;
                    }

                    return params.has("st.app") && params.has("st.signature") && !params.has("vk_app_id");
                }
                catch (exception) {
                    console.warn("[MirraSDK] Failed to detect OK platform override.", exception);
                    return false;
                }
            }

            window.BurgerBay_IsOKPlatform = detectOKPlatform;
            window.BurgerBay_SuppressMediaSession = suppressMediaSessionDeferred;
            patchAudioContextConstructor();
            suppressMediaSessionDeferred();
            window.addEventListener("blur", function () { setAudioContextsPaused(true); }, true);
            window.addEventListener("focus", function () { setAudioContextsPaused(false); }, true);
            window.addEventListener("pagehide", function () { setAudioContextsPaused(true); }, true);
            window.addEventListener("pageshow", function () { setAudioContextsPaused(false); }, true);
            document.addEventListener("visibilitychange", function () { setAudioContextsPaused(document.hidden); }, true);
            document.addEventListener("pointerup", suppressMediaSessionDeferred, true);
            document.addEventListener("touchend", suppressMediaSessionDeferred, true);
            document.addEventListener("change", suppressMediaSessionDeferred, true);
        })();

        window.mirraSDK_library_shouldForceOKPlatform = window.mirraSDK_library_shouldForceOKPlatform || window.BurgerBay_IsOKPlatform;
    </script>
    <script src="unityApp.js"></script>
</body>
</html>
